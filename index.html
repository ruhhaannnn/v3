<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure DropBox</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: #f3f4f6; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .app-container { background: white; width: 100%; max-width: 400px; height: 90vh; max-height: 700px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .header { background: #4f46e5; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 18px; }
        .content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; }
        
        input[type="text"] { width: 100%; padding: 14px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 15px; }
        button { background: #4f46e5; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #4338ca; }
        button.secondary { background: #9ca3af; margin-top: 10px; }
        
        .chat-btn { display: block; background: #eef2ff; color: #4f46e5; padding: 16px; margin-bottom: 12px; border-radius: 8px; text-align: center; font-weight: bold; border: 1px solid #c7d2fe; cursor: pointer; }
        
        .chat-box { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; padding-right: 5px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 75%; font-size: 15px; word-wrap: break-word; line-height: 1.4; }
        .msg.me { background: #4f46e5; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.them { background: #f3f4f6; color: #111827; align-self: flex-start; border-bottom-left-radius: 4px; }
        .chat-controls { display: flex; gap: 10px; flex-direction: column; }
        .char-count { font-size: 12px; color: #6b7280; text-align: right; margin-top: -10px; margin-bottom: 5px;}
        
        #loginSection, #dashboardSection, #chatSection { display: none; }
        #loginSection.active, #dashboardSection.active, #chatSection.active { display: flex; flex-direction: column; height: 100%; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header" id="appHeader">Secure DropBox</div>
    <div class="content">

        <div id="loginSection" class="active">
            <h3 style="text-align: center; color: #374151;">Enter Username</h3>
            <input type="text" id="usernameInput" placeholder="Type username here...">
            <button onclick="handleLogin()">Login</button>
            <p style="text-align: center; color: #6b7280; font-size: 13px; margin-top: 20px;">Connections auto-erase after 12 hours.</p>
        </div>

        <div id="dashboardSection">
            <h3 style="color: #374151;">Your Active Chats</h3>
            <div id="chatList"></div>
            <button class="secondary" onclick="showScreen('loginSection')">Logout</button>
        </div>

        <div id="chatSection">
            <div class="chat-box" id="chatBox"></div>
            <div class="chat-controls">
                <input type="text" id="messageInput" maxlength="30" placeholder="Type a message (30 chars max)...">
                <div class="char-count" id="charCount">0 / 30</div>
                <button id="sendBtn" onclick="sendMessage()">Send</button>
                <button class="secondary" onclick="showScreen('dashboardSection'); clearInterval(chatInterval);">Back to Menu</button>
            </div>
        </div>

    </div>
</div>

<script>
    // HARDCODED TRIAL USERS (Ruhaan changed to Support)
    const userDatabase = {
        "princess2019": [
            { title: "Mama", room: "princess_mama" },
            { title: "Support", room: "princess_support" }
        ],
        "seeerat2023": [
            { title: "Guest", room: "seerat_guest" }
        ],
        "Mama": [
            { title: "Princess", room: "princess_mama" }
        ],
        "Support": [
            { title: "Princess", room: "princess_support" }
        ],
        "Guest": [
            { title: "Seerat", room: "seerat_guest" }
        ]
    };

    let currentUser = "";
    let currentRoom = "";
    let chatInterval = null;
    
    // LIVE GOOGLE APPS SCRIPT URL
    const WORKER_URL = "https://script.google.com/macros/s/AKfycbzu8WdJrgoJJtxCqAqLhDebt-UeDVA4Z8Qxu7pfaTcP4s4YPH6_MAVM_QBHCCm5CgaE/exec";

    function showScreen(screenId) {
        document.getElementById('loginSection').classList.remove('active');
        document.getElementById('dashboardSection').classList.remove('active');
        document.getElementById('chatSection').classList.remove('active');
        document.getElementById(screenId).classList.add('active');
        if(screenId === 'loginSection') document.getElementById('appHeader').innerText = "Secure DropBox";
    }

    function handleLogin() {
        const username = document.getElementById('usernameInput').value.trim();
        if (!userDatabase[username]) {
            alert("Username not found in the system.");
            return;
        }
        
        currentUser = username;
        document.getElementById('usernameInput').value = "";
        
        const listDiv = document.getElementById('chatList');
        listDiv.innerHTML = "";
        userDatabase[username].forEach(chat => {
            const btn = document.createElement('div');
            btn.className = 'chat-btn';
            btn.innerText = `Chat with ${chat.title}`;
            btn.onclick = () => openChat(chat.room, chat.title);
            listDiv.appendChild(btn);
        });

        document.getElementById('appHeader').innerText = `Welcome, ${username}`;
        showScreen('dashboardSection');
    }

    function openChat(room, title) {
        currentRoom = room;
        document.getElementById('appHeader').innerText = `Chat: ${title}`;
        showScreen('chatSection');
        
        fetchMessages();
        chatInterval = setInterval(fetchMessages, 5000); // Check for new messages every 5 seconds
    }

    document.getElementById('messageInput').addEventListener('input', function() {
        document.getElementById('charCount').innerText = this.value.length + " / 30";
    });

    document.getElementById('messageInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
    });

    // FETCH MESSAGES FROM GOOGLE SHEET
    async function fetchMessages() {
        try {
            const response = await fetch(`${WORKER_URL}?room=${currentRoom}`);
            const messages = await response.json();
            
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = ""; 
            
            if (messages.length === 0) {
                chatBox.innerHTML = `<div style="text-align:center; color:#9ca3af; margin-top:20px;">No messages yet.</div>`;
                return;
            }

            messages.forEach(msg => {
                const bubble = document.createElement('div');
                bubble.className = `msg ${msg.sender === currentUser ? 'me' : 'them'}`;
                bubble.innerText = msg.text;
                chatBox.appendChild(bubble);
            });

            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (error) {
            console.log("Fetch running in background or encountered an error...");
        }
    }

    // SEND MESSAGE TO GOOGLE SHEET
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;

        const btn = document.getElementById('sendBtn');
        btn.innerText = "...";
        btn.disabled = true;

        try {
            await fetch(WORKER_URL, {
                method: "POST",
                mode: "no-cors", 
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ room: currentRoom, text: text, sender: currentUser })
            });
            
            input.value = "";
            document.getElementById('charCount').innerText = "0 / 30";
            
            setTimeout(fetchMessages, 1000);
            
        } catch (error) {
            alert("Network error, but message might have sent.");
        } finally {
            btn.innerText = "Send";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
